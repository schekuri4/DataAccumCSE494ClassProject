base_model: mistralai/Mistral-7B-Instruct-v0.3
tokenizer_type: AutoTokenizer
trust_remote_code: false

datasets:
  - path: data/processed/aie_instruction_train.jsonl
    ds_type: json
    type:
      system_prompt: ""
      field_instruction: instruction
      field_input: context
      field_output: response
      format: |-
        ### Instruction:
        {instruction}

        ### Context:
        {input}

        ### Response:
      no_input_format: |-
        ### Instruction:
        {instruction}

        ### Response:

test_datasets:
  - path: data/processed/aie_instruction_validation.jsonl
    ds_type: json
    type:
      system_prompt: ""
      field_instruction: instruction
      field_input: context
      field_output: response
      format: |-
        ### Instruction:
        {instruction}

        ### Context:
        {input}

        ### Response:
      no_input_format: |-
        ### Instruction:
        {instruction}

        ### Response:

adapter: qlora
load_in_4bit: true
strict: false

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

micro_batch_size: 1
gradient_accumulation_steps: 8
num_epochs: 3
learning_rate: 0.0002
optimizer: adamw_torch_fused
lr_scheduler: cosine
warmup_ratio: 0.03

lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target_linear: true

train_on_inputs: false
group_by_length: true

bf16: auto
tf32: auto

val_set_size: 0.0
eval_strategy: steps
eval_steps: 50
save_strategy: steps
save_steps: 50
save_total_limit: 2
logging_steps: 5

output_dir: ./outputs/aie-instruction-sft
dataset_prepared_path: ./prepared/aie-instruction-sft
